<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyChat - SEDES DF</title>
    <style>
        /* CSS from your previous code */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            background: #111827;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2937;
        }

        #mensagens {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .mensagem {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            max-width: 80%;
        }

        .bot .icone {
            color: #38bdf8;
        }

        .usuario .icone {
            color: #4ade80;
        }

        .alternativas {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .alternativa {
            padding: 10px;
            border: 1px solid #334155;
            background: transparent;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }

        .alternativa:hover {
            background: #1e293b;
        }

        .acoes {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .acoes button {
            padding: 8px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #1f2937;
            color: white;
        }

        footer {
            padding: 15px;
            background: #111827;
            border-top: 1px solid #1f2937;
            display: flex;
            gap: 10px;
        }

        #resposta {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: white;
        }

        #enviar {
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #38bdf8;
            color: #0f172a;
        }

        .dica, .resposta {
            padding: 10px;
            background: #0f172a;
            border-radius: 8px;
            margin: 10px 0;
        }

        .resposta.certa {
            border-left: 4px solid #4ade80;
        }

        .resposta.errada {
            border-left: 4px solid #ef4444;
        }

        /* Firebase auth styles */
        #authStatus {
            margin-left: 20px;
            padding: 5px 10px;
            border-radius: 4px;
            background: #1e293b;
        }
    </style>
</head>
<body>
    <header>
        <h1>📚 StudyChat - SEDES DF</h1>
        <div>
            <span>Matéria: </span>
            <select id="materias">
                <option value="constituicao">Constituição Federal</option>
                <option value="portugues">Português</option>
                <option value="informatica">Informática</option>
            </select>
            <div id="authStatus"></div>
        </div>
    </header>

    <main id="mensagens">
        <div class="mensagem bot">
            <div class="icone">🤖</div>
            <div class="texto">
                Olá! Vamos estudar? Clique em "Nova Questão".
            </div>
        </div>
    </main>

    <footer>
        <input type="text" id="resposta" placeholder="Sua resposta...">
        <button id="enviar">Enviar</button>
        <button id="novaQuestao">Nova Questão</button>
        <button id="dica">Dica</button>
        <button id="explicacao">Explicação</button>
        <button id="favoritar">⭐</button>
        <button id="login">Login</button>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBO0Ml85drfObZMl00FGGskR9bqHVkQ02k",
            authDomain: "studychat-saas.firebaseapp.com",
            projectId: "studychat-saas",
            storageBucket: "studychat-saas.firebasestorage.app",
            messagingSenderId: "336469459364",
            appId: "1:336469459364:web:2767036983bcb1f6ff0131"
        };

        // Inicializa Firebase
        firebase.initializeApp(firebaseConfig);

        // Referências para Firebase services
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Estado da aplicação
        let questoes = [
            {
                id: 1,
                pergunta: "Qual é a data da promulgação da Constituição Federal?",
                alternativas: ["A) 5 de outubro de 1988", "B) 5 de outubro de 1989", "C) 10 de novembro de 1988", "D) 10 de novembro de 1989"],
                correta: "A",
                dica: "Lembre-se do ano de 1988",
                explicacao: "A Constituição Federal foi promulgada em 5 de outubro de 1988.",
                materia: "constituicao"
            },
            {
                id: 2,
                pergunta: "Qual é a capital do Brasil?",
                alternativas: ["A) São Paulo", "B) Rio de Janeiro", "C) Brasília", "D) Recife"],
                correta: "C",
                dica: "É a cidade mais importante do país",
                explicacao: "Brasília é a capital do Brasil e está localizada na região Centro-Oeste.",
                materia: "constituicao"
            }
        ];

        let questaoAtual = null;
        let usuarioAtual = null;

        // Funções auxiliares
        function exibirMensagem(tipo, texto) {
            const div = document.createElement("div");
            div.className = `mensagem ${tipo}`;
            
            div.innerHTML = `
                <div class="icone">${tipo === "bot" ? "🤖" : "👤"}</div>
                <div class="texto">${texto}</div>
            `;
            
            document.getElementById("mensagens").appendChild(div);
            document.getElementById("mensagens").scrollTop = document.getElementById("mensagens").scrollHeight;
        }

        function limparRespostas() {
            const alternativas = document.querySelector(".alternativas");
            if (alternativas) alternativas.remove();
            
            const acoes = document.querySelector(".acoes");
            if (acoes) acoes.remove();
            
            const dica = document.querySelector(".dica");
            if (dica) dica.remove();
            
            const resposta = document.querySelector(".resposta");
            if (resposta) resposta.remove();
        }

        // Firebase auth functions
        function updateUserStatus(user) {
            if (user) {
                usuarioAtual = user;
                document.getElementById("authStatus").textContent = 
                    `👤 ${user.displayName || user.email}`;
            } else {
                usuarioAtual = null;
                document.getElementById("authStatus").textContent = "Login necessário";
            }
        }

        // Event listeners
        document.getElementById("novaQuestao").addEventListener("click", async () => {
            limparRespostas();
            
            if (!usuarioAtual) {
                exibirMensagem("bot", "Faça login para continuar.");
                return;
            }
            
            const materias = document.getElementById("materias").value;
            const questoesFiltradas = questoes.filter(q => q.materia === materias);
            
            if (questoesFiltradas.length === 0) {
                exibirMensagem("bot", "Nenhuma questão disponível para esta matéria.");
                return;
            }
            
            questaoAtual = questoesFiltradas[Math.floor(Math.random() * questoesFiltradas.length)];
            exibirMensagem("bot", questaoAtual.pergunta);
            
            // Adicionar alternativas
            const alternativas = document.createElement("div");
            alternativas.className = "alternativas";
            
            questaoAtual.alternativas.forEach(alternativa => {
                const btn = document.createElement("button");
                btn.className = "alternativa";
                btn.textContent = alternativa;
                btn.addEventListener("click", () => {
                    const resposta = alternativa.charAt(0);
                    verificarResposta(resposta);
                });
                alternativas.appendChild(btn);
            });
            
            document.querySelector("footer").prepend(alternativas);
            
            // Adicionar ações
            const acoes = document.createElement("div");
            acoes.className = "acoes";
            
            const dicaBtn = document.createElement("button");
            dicaBtn.textContent = "Dica";
            dicaBtn.addEventListener("click", () => {
                exibirMensagem("bot", "💡 " + questaoAtual.dica);
            });
            
            const explicacaoBtn = document.createElement("button");
            explicacaoBtn.textContent = "Explicação";
            explicacaoBtn.addEventListener("click", () => {
                exibirMensagem("bot", "📖 " + questaoAtual.explicacao);
            });
            
            acoes.appendChild(dicaBtn);
            acoes.appendChild(explicacaoBtn);
            document.querySelector("footer").prepend(acoes);
        });

        function verificarResposta(resposta) {
            if (!questaoAtual || !usuarioAtual) return;
            
            const certa = resposta.toUpperCase() === questaoAtual.correta.toUpperCase();
            
            // Adicionar feedback visual
            document.querySelectorAll(".alternativa").forEach(btn => {
                btn.disabled = true;
                if (btn.textContent.includes(questaoAtual.correta)) {
                    btn.style.background = certa ? "#4ade80" : "#ef4444";
                } else if (btn.textContent.includes(resposta)) {
                    btn.style.background = "#ef4444";
                }
            });
            
            // Adicionar resposta
            const respostaDiv = document.createElement("div");
            respostaDiv.className = `resposta ${certa ? "certa" : "errada"}`;
            respostaDiv.textContent = certa 
                ? "✅ Correto!" 
                : `❌ Incorreto! Resposta correta: ${questaoAtual.correta}`;
            document.querySelector("footer").prepend(respostaDiv);
            
            // Exibir feedback
            exibirMensagem("bot", certa 
                ? "Parabéns! Você acertou." 
                : `Tente novamente! Resposta correta: ${questaoAtual.correta}`);
                
            // Salvar progresso no Firestore
            db.collection("usuarios").doc(usuarioAtual.uid).collection("questoes")
                .add({
                    questaoId: questaoAtual.id,
                    resposta: resposta,
                    correta: certa,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
            // Adicionar ação favoritar
            const favoritarBtn = document.querySelector("#favoritar");
            favoritarBtn.onclick = () => {
                exibirMensagem("bot", "⭐ Questão adicionada aos favoritos!");
            };
        }

        document.getElementById("enviar").addEventListener("click", () => {
            const resposta = document.getElementById("resposta").value.trim();
            if (resposta) {
                verificarResposta(resposta);
                document.getElementById("resposta").value = "";
            }
        });

        document.getElementById("login").addEventListener("click", () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .catch(err => {
                    exibirMensagem("bot", "Erro ao fazer login: " + err.message);
                });
        });

        // Monitora mudanças de autenticação
        auth.onAuthStateChanged(user => {
            updateUserStatus(user);
            
            if (user) {
                // Carrega progresso do usuário
                db.collection("usuarios").doc(user.uid).collection("questoes")
                    .get()
                    .then(snapshot => {
                        const progresso = snapshot.size;
                        exibirMensagem("bot", `Bem-vindo de volta! Você respondeu ${progresso} questões.`);
                    });
            }
        });

        // Inicializar
        window.onload = () => {
            exibirMensagem("bot", "Olá! Faça login para começar a estudar.");
        };
    </script>
</body>
</html>
